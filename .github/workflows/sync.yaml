# .github/workflows/sync-helm-charts.yaml
name: Sync Helm Charts to GHCR

on:
  #schedule:
  #  - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write  # required to push to GHCR

jobs:
  sync:
    name: Sync Charts
    runs-on: ubuntu-latest
    env:
      SOURCE_URL: https://subshell.github.io/helm-charts/
      REGISTRY: ghcr.io
      # charts will land at ghcr.io/your-org/helm-mirror/<chart-name>:<version>
      REGISTRY_PATH: ${{ github.repository_owner }}/subshell-helm-mirror

    steps:
      - name: Install charts-syncer
        run: |
          curl -sSL -o /tmp/charts-syncer.tar.gz \
            "https://github.com/bitnami/charts-syncer/releases/download/v2.4.0/charts-syncer_2.4.0_linux_x86_64.tar.gz"
          tar -xz -f /tmp/charts-syncer.tar.gz -C /tmp
          sudo mv /tmp/charts-syncer /usr/local/bin/
          charts-syncer version
      
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Write charts-syncer config
        run: |
          cat <<EOF > config.yaml
          source:
            repo:
              kind: HELM
              url: ${SOURCE_URL}

          target:
            repo:
              kind: OCI
              url: https://${REGISTRY}/${REGISTRY_PATH}
              auth:
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
          skipCharts: 
            - o-neko
          skipImages: true
          EOF

      - name: Run sync
        run: |
          # Disable terminal detection to suppress progress spinner
          TERM=dumb charts-syncer sync --config=config.yaml --latest-version-only=false
